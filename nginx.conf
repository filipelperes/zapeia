server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CRÍTICO: inclui MIME types padrão (js, css, svg, opus, vcf…)
    include /etc/nginx/mime.types;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml image/webp audio/ogg text/vcard;
    gzip_min_length 256;

    # ── Assets compilados (com hash no nome) ──────────────
    # Cache eterno: imutável, seguro para versionar
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── chat.txt — sempre fresco (app faz polling 5s) ────
    location = /chat.txt {
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # ── Mídias da conversa (imagens, vídeos, áudios, contatos) ─
    location /media/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Favicon ──────────────────────────────────────────
    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback + arquivos estáticos ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
