server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # CRITICAL: include default MIME types (js, css, svg, opus, vcf…)
    include /etc/nginx/mime.types;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml image/webp audio/ogg text/vcard;
    gzip_min_length 256;

    # ── Compiled assets (with hash in filename) ────────────
    # Eternal cache: immutable, safe to version
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── chat.txt — always fresh (app polls every 5s) ─────
    location = /chat.txt {
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # ── Conversation media (images, videos, audio, contacts) ───
    location /media/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Favicon ──────────────────────────────────────────
    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback + static assets ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
