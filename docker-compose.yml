services:
  zapeia:
    # ── Local build (comment out if using the Hub image) ──
    build:
      context: .
      dockerfile: Dockerfile
    # ── Docker Hub image (uncomment and comment out the build above) ──
    # image: filipelperes/zapeia:latest
    container_name: zapeia
    ports:
      - "5174:80"
    volumes:
      # User data — mounted at runtime, NOT baked into the image
      - ./chat.txt:/usr/share/nginx/html/chat.txt
      - ./media:/usr/share/nginx/html/media
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
