services:
  zapeia:
    # ── Build local (comente se for usar a imagem do Hub) ──
    build:
      context: .
      dockerfile: Dockerfile
    # ── Imagem do Docker Hub (descomente e comente o build acima) ──
    # image: filipelperes/zapeia:latest
    container_name: zapeia
    ports:
      - "5174:80"
    volumes:
      # Dados do usuário — montados em runtime, NÃO na imagem
      - ./chat.txt:/usr/share/nginx/html/chat.txt
      - ./media:/usr/share/nginx/html/media
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
